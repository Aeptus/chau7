# Wikipedia English Article Audit Blueprint
# Adapted from: https://github.com/fuzheado/Wikipedia-AI-Skills/
name: "Wikipedia Article Audit"
description: "A 3-phase collaborative audit of a Wikipedia article to produce a repair task graph."

inputs:
  article_title:
    description: "The exact title of the Wikipedia article to audit"
    type: "string"

pipeline:
  - id: diagnosis
    name: "Phase 1: Diagnosis (Automated)"
    agent: "codebase_investigator"
    # We use the codebase_investigator because it's good at finding tools/scripts in the repo
    instructions: |
      You are the Diagnosis Agent. 
      1. Ensure you are in the Wikipedia-AI-Skills repository.
      2. Execute the diagnosis phase for article: "{{article_title}}".
      3. Use the available scripts (e.g., ./scripts/01-diagnose.sh) to gather raw data.
      4. Verify that `diagnosis.json` and `sentences.jsonl` are generated in the output folder.
    wait_until: "ready_for_exec"

  - id: verification
    name: "Phase 2: Verification (Human-in-the-loop)"
    agent: "generalist"
    depends_on: ["diagnosis"]
    instructions: |
      You are the Verification Assistant. Your goal is to help the user verify claims.
      1. Read the `sentences.jsonl` and `diagnosis.json` generated by the Diagnosis agent.
      2. For each sentence, provide the user with the cited source and a brief summary.
      3. Ask the user to confirm, contradict, or flag the sentence.
      4. Update the `verification.json` file as the user provides input.
    # This tab stays open for user interaction
    interaction: true

  - id: taskgraph
    name: "Phase 3: Taskgraph (Automated)"
    agent: "generalist"
    depends_on: ["verification"]
    instructions: |
      You are the Taskgraph Generator.
      1. Once the user has finished verification, read `verification.json`.
      2. Execute the taskgraph generation scripts to compile a repair plan.
      3. Generate `taskgraph.json` and the final `analysis.md` report.
      4. Present the repair DAG (Directed Acyclic Graph) to the user.
    wait_until: "ready_for_exec"
