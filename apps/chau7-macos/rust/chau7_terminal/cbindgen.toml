# cbindgen configuration for chau7_terminal

language = "C"

# Header configuration
header = """/**
 * chau7_terminal.h - C FFI Interface for Chau7 Terminal Emulator
 *
 * Auto-generated by cbindgen. Do not edit directly.
 */"""

include_guard = "CHAU7_TERMINAL_H"
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not edit manually. */"

# Include standard headers
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]

# Documentation style
documentation = true
documentation_style = "c"

# Tab width for formatting
tab_width = 4

# Style configuration
style = "both"
usize_is_size_t = true

# Bracing style
braces = "SameLine"
line_length = 100

[export]
include = [
    "Chau7Terminal",
    "CellData",
    "GridSnapshot",
]

[fn]
args = "auto"

[struct]
rename_fields = "None"

[enum]
rename_variants = "ScreamingSnakeCase"
