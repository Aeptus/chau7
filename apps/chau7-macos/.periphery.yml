# Periphery config for Chau7 macOS app.
# Runs in Scripts/ci-local (full local CI), not pre-commit/pre-push.
# Keys match Periphery 3.x schema — see `periphery scan --help`.

# Retain public APIs: many Chau7 modules expose public types that are used
# via Metal interop, @objc runtime, SwiftUI view inspection, or Obj-C bridges
# that periphery can't statically see. Without this, periphery's false-
# positive rate was ~50%.
retain_public: true
retain_assign_only_properties: true
retain_objc_accessible: true
retain_objc_annotated: true
retain_swift_ui_previews: true
retain_codable_properties: true
retain_encodable_properties: true
retain_unused_protocol_func_params: true
disable_redundant_public_analysis: true
disable_unused_import_analysis: true

index_exclude:
  - "rust/**"
  - "Libraries/**"
  - ".build/**"

# Periphery is only reliable on the pure-Swift Chau7Core library.
# The Chau7 UI target has heavy Metal/AppKit/Obj-C runtime interop where
# static analysis produces ~50% false positives — we don't block on it.
# Tests are also excluded because test fixtures legitimately reference
# things via dynamic dispatch.
report_exclude:
  - "Tests/**"
  - "rust/**"
  - "Libraries/**"
  - "Sources/Chau7/**"
