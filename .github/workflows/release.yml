name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Swift version
        run: swift --version

      - name: Build app bundle
        working-directory: apps/chau7-macos
        run: ./Scripts/build-app.sh

      - name: Run tests
        working-directory: apps/chau7-macos
        run: swift test

      - name: Build DMG
        working-directory: apps/chau7-macos
        run: |
          if [ -f ./Scripts/build-dist.sh ]; then
            ./Scripts/build-dist.sh
          else
            echo "No dist script found, skipping DMG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/chau7-macos/dist/*.dmg
