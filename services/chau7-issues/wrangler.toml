name = "chau7-issues"
main = "src/worker.js"
compatibility_date = "2024-10-01"

# Custom domain: issues.chau7.sh
# Attach the domain with Scripts/cutover-from-legacy-relay.sh after secrets are
# installed. Keeping the route/domain out of static config prevents a bootstrap
# deploy from moving production traffic to an unconfigured Worker.

[[durable_objects.bindings]]
name = "ISSUE_RATE_LIMIT"
class_name = "IssueRateLimitDO"

[[migrations]]
tag = "v1"
new_classes = ["IssueRateLimitDO"]
