name = "chau7-issues"
main = "src/worker.js"
compatibility_date = "2024-10-01"

# Custom domain: issues.chau7.sh
# Set up via Cloudflare dashboard: Workers > chau7-issues > Settings > Domains & Routes > Add > Custom Domain
# Or via wrangler: uncomment and set zone_name to your zone
# [[routes]]
# pattern = "issues.chau7.sh/*"
# zone_name = "chau7.sh"

[[durable_objects.bindings]]
name = "ISSUE_RATE_LIMIT"
class_name = "IssueRateLimitDO"

[[migrations]]
tag = "v1"
new_classes = ["IssueRateLimitDO"]
