name = "chau7-ios-relay"
main = "src/worker.ts"
compatibility_date = "2024-10-01"

[vars]
RELAY_SECRET = "CHANGE_ME_IN_PRODUCTION"

# Custom domain: relay.chau7.sh
# Set up via Cloudflare dashboard: Workers > chau7-ios-relay > Settings > Domains & Routes > Add > Custom Domain
# Or via wrangler: uncomment and set zone_name to your zone
# [[routes]]
# pattern = "relay.chau7.sh/*"
# zone_name = "chau7.sh"

[[durable_objects.bindings]]
name = "SESSION"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_classes = ["SessionDO"]
