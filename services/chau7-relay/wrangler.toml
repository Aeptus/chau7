name = "chau7-ios-relay"
main = "src/worker.ts"
compatibility_date = "2025-11-01"

# Authentication fails CLOSED. Provide the shared secret as a Worker secret
# (never a plaintext var):
#
#   wrangler secret put RELAY_SECRET
#
# If RELAY_SECRET is absent, authenticated routes return 503 unless you
# explicitly opt into unauthenticated rollout mode by setting the var below to
# the string "true" (logged as a warning on use):
#
# [vars]
# RELAY_ALLOW_UNAUTHENTICATED = "true"

[observability]
enabled = true

# Custom domain: relay.chau7.sh
# Set up via Cloudflare dashboard: Workers > chau7-ios-relay > Settings > Domains & Routes > Add > Custom Domain
# Or via wrangler: uncomment and set zone_name to your zone
# [[routes]]
# pattern = "relay.chau7.sh/*"
# zone_name = "chau7.sh"

[[durable_objects.bindings]]
name = "SESSION"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_classes = ["SessionDO"]
