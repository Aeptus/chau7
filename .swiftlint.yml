# SwiftLint Configuration for Chau7

# Paths to include
included:
  - Sources
  - Tests

# Paths to exclude
excluded:
  - .build
  - Packages

# Disabled rules
disabled_rules:
  - trailing_whitespace      # Too strict for rapid development
  - todo                     # We allow TODOs in code
  - opening_brace            # Conflicts with some patterns

# Opt-in rules
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Rule configurations

# Line length - warn at 120, error at 200
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

# File length - warn at 600, error at 1000
file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

# Type body length
type_body_length:
  warning: 400
  error: 600

# Function body length
function_body_length:
  warning: 60
  error: 100

# Cyclomatic complexity
cyclomatic_complexity:
  warning: 15
  error: 25
  ignores_case_statements: true

# Nesting
nesting:
  type_level:
    warning: 3
    error: 5
  function_level:
    warning: 3
    error: 5

# Identifier name
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - ok
    - i
    - j
    - x
    - y
    - dx
    - dy
    - fd
    - fg
    - bg
    - to
    - L   # Localization function

# Type name
type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - ID

# Large tuple
large_tuple:
  warning: 4
  error: 5

# Force cast
force_cast: warning

# Force try
force_try: warning

# Force unwrapping
force_unwrapping: warning

# Implicit getter
implicit_getter: error

# Vertical whitespace
vertical_whitespace:
  max_empty_lines: 2

# Trailing comma
trailing_comma:
  mandatory_comma: false

# Colon
colon:
  apply_to_dictionaries: true

# Comma
comma: warning

# Statement position
statement_position:
  statement_mode: default

# Custom rules
custom_rules:
  # Avoid print statements in production code
  no_print_statements:
    name: "No Print Statements"
    regex: '^\s*print\s*\('
    message: "Use Log.debug() instead of print()"
    severity: warning
    match_kinds:
      - identifier

  # Require MARK comments in files over 100 lines
  mark_comment_spacing:
    name: "MARK Comment Spacing"
    regex: '// MARK:[^ -]'
    message: "MARK comments should have a space after the colon"
    severity: warning

  # Discourage force unwrapping in non-UI code
  force_unwrap_warning:
    name: "Force Unwrap Warning"
    regex: '\w+!'
    message: "Consider using guard let or if let instead of force unwrapping"
    severity: warning
    match_kinds:
      - identifier

# Reporter type
reporter: "xcode"
